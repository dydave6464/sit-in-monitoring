<!doctype html>
<html>
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Register – CCS Sit-in Monitoring</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">
        College of Computer Studies Sit-in Monitoring System
      </div>
      <ul class="nav-links">
        <li>Home</li>
        <li>Community</li>
        <li>About</li>
        <li><a href="index.html">Login</a></li>
        <li>Register</li>
      </ul>
    </nav>

    <div class="register-container">
      <div class="back-button">
        <a href="index.html">← Back</a>
      </div>
      <h2>Create an account</h2>

      <form id="registerForm">
        <label for="idNumber">ID Number</label>
        <input
          type="text"
          id="idNumber"
          placeholder="8-digit ID Number"
          pattern="[0-9]{8}"
          maxlength="8"
          required
        />

        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Last Name" required />

        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="First Name" required />

        <label for="middleName">Middle Name</label>
        <input type="text" id="middleName" placeholder="Middle Name" required />

        <label for="course">Course</label>
        <select id="course" name="course" required>
          <option value="">Select Course</option>
          <option>Information Technology</option>
          <option>Computer Engineering</option>
          <option>Civil Engineering</option>
          <option>Mechanical Engineering</option>
          <option>Electrical Engineering</option>
          <option>Industrial Engineering</option>
          <option>Naval Architecture and Marine Engineering</option>
          <option>Elementary Education (BEEd)</option>
          <option>Secondary Education (BSEd)</option>
          <option>Criminology</option>
          <option>Commerce</option>
          <option>Accountancy</option>
          <option>Hotel and Restaurant Management</option>
          <option>Customs Administration</option>
          <option>Computer Secretarial</option>
          <option>Industrial Psychology</option>
          <option>AB Political Science</option>
          <option>AB English</option>
        </select>

        <label for="courseLevel">Course Level</label>
        <select id="courseLevel" name="courseLevel" required>
          <option value="">Select Level</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>

        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="Your email address"
          required
        />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Create a password"
          required
        />

        <label for="repeatPassword">Repeat Password</label>
        <input
          type="password"
          id="repeatPassword"
          placeholder="Confirm your password"
          required
        />

        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Your address" />

        <button type="submit" class="register-button">Create Account</button>
      </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
